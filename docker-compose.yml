services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      DB_DSN: "mysql:host=db;dbname=${DB_NAME:-wearview_supportdb};charset=utf8mb4"
      DB_USER: "${DB_USER:-wearview_app}"
      DB_PASS: "${DB_PASS:-wearview_app_password}"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "${DB_NAME:-wearview_supportdb}"
      MYSQL_USER: "${DB_USER:-wearview_app}"
      MYSQL_PASSWORD: "${DB_PASS:-wearview_app_password}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASS:-wearview_root_password}"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db_data:
